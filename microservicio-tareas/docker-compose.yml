services:
  api:
    build: .
    container_name: microservicio-api
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      APP_NAME: microservicio-tareas
    volumes:
      - app_data:/app/data
    networks:
      - microservicio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app_data:

networks:
  microservicio-network:
    driver: bridge
